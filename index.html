<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資深前端工程師技術指南</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />

  <!-- Prism.js syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism.min.css" id="prism-theme-light" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" id="prism-theme-dark" disabled />

  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Mobile Top Bar -->
  <header id="top-bar">
    <button id="hamburger" aria-label="開啟目錄" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <span class="top-bar-title">資深前端工程師技術指南</span>
    <div class="header-controls">
      <div class="language-menu-wrap" data-language-menu>
        <button
          type="button"
          class="language-menu-trigger"
          aria-label="選擇語言"
          aria-haspopup="true"
          aria-expanded="false"
          title="語言選項（即將推出）"
          disabled
        >
          <span class="language-caret" aria-hidden="true">▾</span>
        </button>
        <div class="language-menu" role="menu" aria-label="語言選單" hidden>
          <button type="button" class="language-menu-item" role="menuitemradio" aria-checked="false" disabled>
            <span>English</span>
          </button>
          <button type="button" class="language-menu-item is-active" role="menuitemradio" aria-checked="true" disabled>
            <span>繁體中文</span>
          </button>
        </div>
      </div>
      <button id="theme-toggle-mobile" aria-label="切換主題" title="切換深淺色主題">
        <span class="theme-icon">☀</span>
      </button>
    </div>
  </header>

  <!-- Overlay (shared by drawer and sections panel) -->
  <div id="overlay" aria-hidden="true"></div>

  <!-- Mobile Left Drawer (chapters only) -->
  <aside id="mobile-drawer" aria-label="章節目錄" aria-hidden="true">
    <div class="drawer-header">
      <span>目錄</span>
      <button id="drawer-close" aria-label="關閉目錄">✕</button>
    </div>
    <nav id="drawer-nav"></nav>
  </aside>

  <!-- Mobile Right Sections Panel -->
  <aside id="sections-panel" aria-label="本章節目" aria-hidden="true">
    <div class="drawer-header">
      <span>本章節目</span>
      <button id="sections-close" aria-label="關閉節目清單">✕</button>
    </div>
    <nav id="sections-nav"></nav>
  </aside>

  <!-- Main App Grid -->
  <div id="app">
    <!-- Desktop Sidebar -->
    <aside id="sidebar" aria-label="章節目錄">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="6" fill="var(--color-accent)" opacity="0.9"/>
            <path d="M8 10l8-4 8 4v8c0 5-4 9-8 10C12 27 8 23 8 18V10z" fill="white" opacity="0.25"/>
            <path d="M16 8l-5 2.5V14c0 3.5 2.5 6.5 5 7.5 2.5-1 5-4 5-7.5v-3.5L16 8z" fill="white" opacity="0.5"/>
          </svg>
          <span>資深前端工程師技術指南</span>
        </div>
        <div class="header-controls">
          <button id="theme-toggle" aria-label="切換主題" title="切換深淺色主題">
            <span class="theme-icon">☀</span>
          </button>
        </div>
        <button id="sidebar-collapse-toggle" aria-label="收起側欄" title="收起側欄">
          <span aria-hidden="true">←</span>
        </button>
      </div>
      <div class="sidebar-toolbar">
        <div class="language-menu-wrap" data-language-menu>
          <button
            type="button"
            class="language-menu-trigger"
            aria-label="選擇語言"
            aria-haspopup="true"
            aria-expanded="false"
            title="語言選項（即將推出）"
            disabled
          >
            <span class="language-label">繁體中文</span>
            <span class="language-caret" aria-hidden="true">▾</span>
          </button>
          <div class="language-menu" role="menu" aria-label="語言選單" hidden>
            <button type="button" class="language-menu-item" role="menuitemradio" aria-checked="false" disabled>
              <span>English</span>
            </button>
            <button type="button" class="language-menu-item is-active" role="menuitemradio" aria-checked="true" disabled>
              <span>繁體中文</span>
            </button>
          </div>
        </div>
      </div>
      <nav id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <a
          class="sidebar-github-link"
          href="#"
          target="_blank"
          rel="noreferrer"
          aria-label="關於本書"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.164 6.839 9.49.5.09.682-.218.682-.484 0-.236-.009-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.268 2.75 1.026A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.026 2.747-1.026.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .269.18.579.688.481C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          <span>關於本書</span>
        </a>
      </div>
    </aside>

    <!-- Content Area -->
    <main id="content-area">
      <div id="content-wrapper">
        <div id="content-body">
          <div class="loading-placeholder">
            <div class="loading-spinner"></div>
            <p>載入中...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button id="sidebar-expand-toggle" aria-label="展開側欄" title="展開側欄" aria-expanded="true">
    <span aria-hidden="true">→</span>
  </button>

  <!-- Mobile Sections Toggle Button -->
  <button id="sections-toggle" aria-label="查看本章節目" aria-expanded="false">
    <span>≡</span> 節目
  </button>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
  <script>
    if (typeof Prism !== 'undefined' && Prism.plugins && Prism.plugins.autoloader) {
      Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/';
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
